<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Papa's March Madness 2026</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Papa's MM">
<meta name="theme-color" content="#060a14">
<link rel="manifest" href="manifest.json">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;500;600;700;800&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════════════════════
   RESET & VARIABLES
   ═══════════════════════════════════════════════════════ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg-deep: #060a14;
  --bg-primary: #0a0e1a;
  --bg-card: rgba(14, 20, 36, 0.85);
  --bg-card-hover: rgba(20, 28, 50, 0.9);
  --bg-elevated: #141c2e;
  --accent-orange: #ff6b2b;
  --accent-orange-dim: rgba(255, 107, 43, 0.15);
  --accent-blue: #00d4ff;
  --accent-blue-dim: rgba(0, 212, 255, 0.12);
  --gold: #ffd700;
  --gold-glow: rgba(255, 215, 0, 0.25);
  --silver: #b8c4d8;
  --silver-glow: rgba(184, 196, 216, 0.15);
  --bronze: #cd7f32;
  --bronze-glow: rgba(205, 127, 50, 0.15);
  --correct: #00e676;
  --correct-dim: rgba(0, 230, 118, 0.12);
  --wrong: #ff4757;
  --wrong-dim: rgba(255, 71, 87, 0.12);
  --cold-blue: #4fc3f7;
  --cold-dim: rgba(79, 195, 247, 0.12);
  --text-primary: #f0f2f5;
  --text-secondary: #8892a4;
  --text-muted: #4a5568;
  --border: rgba(255, 255, 255, 0.06);
  --border-hover: rgba(255, 255, 255, 0.12);
  --font-display: 'Barlow Condensed', sans-serif;
  --font-body: 'DM Sans', sans-serif;
  --radius: 10px;
  --radius-lg: 16px;
}

html { font-size: 16px; -webkit-text-size-adjust: 100%; }
body {
  font-family: var(--font-body);
  color: var(--text-primary);
  background:
    radial-gradient(ellipse at 50% -10%, rgba(0,212,255,0.06) 0%, transparent 55%),
    radial-gradient(ellipse at 80% 60%, rgba(255,107,43,0.03) 0%, transparent 40%),
    repeating-linear-gradient(0deg, transparent, transparent 39px, rgba(255,255,255,0.015) 39px, rgba(255,255,255,0.015) 40px),
    repeating-linear-gradient(90deg, transparent, transparent 39px, rgba(255,255,255,0.015) 39px, rgba(255,255,255,0.015) 40px),
    var(--bg-deep);
  min-height: 100vh;
  overflow-x: hidden;
  line-height: 1.5;
}
a { color: var(--accent-blue); text-decoration: none; }
button { cursor: pointer; border: none; background: none; font-family: inherit; color: inherit; }

/* ═══════════════════════════════════════════════════════
   LAYOUT
   ═══════════════════════════════════════════════════════ */
.container { max-width: 960px; margin: 0 auto; padding: 0 12px; }

/* ═══════════════════════════════════════════════════════
   HEADER
   ═══════════════════════════════════════════════════════ */
.header {
  text-align: center;
  padding: 24px 16px 12px;
  position: relative;
}
.header::after {
  content: '';
  position: absolute;
  bottom: 0; left: 10%; right: 10%;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--border-hover), transparent);
}
.title {
  font-family: var(--font-display);
  font-weight: 800;
  font-size: 2.4rem;
  letter-spacing: 0.04em;
  text-transform: uppercase;
  line-height: 1.1;
  background: linear-gradient(135deg, #fff 0%, #c8d0dc 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}
.title-year {
  font-family: var(--font-display);
  font-weight: 700;
  font-size: 1.3rem;
  color: var(--accent-orange);
  letter-spacing: 0.2em;
  text-transform: uppercase;
  margin-top: 2px;
}
.last-updated {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  font-size: 0.82rem;
  color: var(--text-muted);
  margin-top: 8px;
}
.pulse-dot {
  width: 7px; height: 7px;
  border-radius: 50%;
  background: var(--correct);
  animation: pulse 2s ease-in-out infinite;
}
@keyframes pulse {
  0%, 100% { opacity: 1; box-shadow: 0 0 0 0 rgba(0,230,118,0.5); }
  50% { opacity: 0.6; box-shadow: 0 0 0 4px rgba(0,230,118,0); }
}
.refresh-btn {
  font-size: 0.82rem;
  color: var(--text-muted);
  padding: 2px 8px;
  border-radius: 4px;
  transition: color 0.2s;
}
.refresh-btn:hover { color: var(--accent-blue); }

/* ═══════════════════════════════════════════════════════
   NAVIGATION — 8 TABS, WRAPPING
   ═══════════════════════════════════════════════════════ */
.nav {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 4px;
  padding: 14px 8px 10px;
  position: sticky;
  top: 0;
  z-index: 100;
  background: linear-gradient(var(--bg-deep), rgba(6,10,20,0.95));
  backdrop-filter: blur(12px);
}
.nav-btn {
  font-family: var(--font-display);
  font-weight: 600;
  font-size: 0.95rem;
  letter-spacing: 0.05em;
  text-transform: uppercase;
  padding: 7px 14px;
  border-radius: 6px;
  color: var(--text-secondary);
  transition: all 0.25s;
  position: relative;
  white-space: nowrap;
}
.nav-btn.active {
  color: var(--text-primary);
  background: var(--accent-orange-dim);
}
.nav-btn.active::after {
  content: '';
  position: absolute;
  bottom: 0; left: 20%; right: 20%;
  height: 2px;
  background: var(--accent-orange);
  border-radius: 1px;
}
.nav-btn:not(.active):hover { color: var(--text-primary); background: rgba(255,255,255,0.04); }

/* ═══════════════════════════════════════════════════════
   VIEWS
   ═══════════════════════════════════════════════════════ */
.view { display: none; padding: 12px 0 60px; }
.view.active { display: block; }
.section-title {
  font-family: var(--font-display);
  font-weight: 700;
  font-size: 1rem;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--text-secondary);
  margin: 20px 0 12px;
  padding-left: 2px;
}

/* ═══════════════════════════════════════════════════════
   LEADERBOARD — PODIUM
   ═══════════════════════════════════════════════════════ */
.podium { display: flex; justify-content: center; align-items: flex-end; gap: 8px; margin: 16px 0 20px; }
.podium-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  text-align: center;
  padding: 18px 10px 14px;
  flex: 1;
  max-width: 180px;
  position: relative;
  overflow: hidden;
  transition: transform 0.3s;
}
.podium-card:hover { transform: translateY(-3px); }
.podium-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 3px;
}
.podium-card.gold { order: 2; }
.podium-card.gold::before { background: linear-gradient(90deg, transparent, var(--gold), transparent); }
.podium-card.gold { border-color: rgba(255,215,0,0.2); box-shadow: 0 0 30px var(--gold-glow), inset 0 1px 0 rgba(255,215,0,0.1); }
.podium-card.silver { order: 1; }
.podium-card.silver::before { background: linear-gradient(90deg, transparent, var(--silver), transparent); }
.podium-card.silver { border-color: rgba(184,196,216,0.15); box-shadow: 0 0 20px var(--silver-glow); }
.podium-card.bronze { order: 3; }
.podium-card.bronze::before { background: linear-gradient(90deg, transparent, var(--bronze), transparent); }
.podium-card.bronze { border-color: rgba(205,127,50,0.15); box-shadow: 0 0 20px var(--bronze-glow); }
.podium-rank {
  font-family: var(--font-display);
  font-weight: 800;
  font-size: 0.95rem;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  margin-bottom: 2px;
}
.podium-card.gold .podium-rank { color: var(--gold); }
.podium-card.silver .podium-rank { color: var(--silver); }
.podium-card.bronze .podium-rank { color: var(--bronze); }
.podium-score {
  font-family: var(--font-display);
  font-weight: 800;
  font-size: 2.6rem;
  line-height: 1;
  margin: 2px 0;
}
.podium-card.gold .podium-score { color: var(--gold); }
.podium-card.silver .podium-score { color: var(--silver); }
.podium-card.bronze .podium-score { color: var(--bronze); }
/* Podium size hierarchy: 2nd ~15% smaller, 3rd ~25% smaller */
.podium-card.silver .podium-score { font-size: 2.2rem; }
.podium-card.bronze .podium-score { font-size: 1.9rem; }
.podium-card.silver { padding: 15px 10px 12px; }
.podium-card.bronze { padding: 12px 8px 10px; }
.podium-medal { font-size: 1.6rem; margin-bottom: 2px; display: block; line-height: 1; }
.podium-card.silver .podium-medal { font-size: 1.35rem; }
.podium-card.bronze .podium-medal { font-size: 1.2rem; }
.podium-name {
  font-family: var(--font-display);
  font-weight: 600;
  font-size: 1.15rem;
  letter-spacing: 0.04em;
  text-transform: uppercase;
  color: var(--text-primary);
}
.podium-card.silver .podium-name { font-size: 1rem; }
.podium-card.bronze .podium-name { font-size: 0.92rem; }

/* ═══════════════════════════════════════════════════════
   LEADERBOARD — PROGRESS BAR
   ═══════════════════════════════════════════════════════ */
.progress-section {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  margin: 0 0 16px;
  justify-content: center;
}
.progress-item {
  display: flex;
  align-items: center;
  gap: 5px;
  font-size: 0.78rem;
  color: var(--text-muted);
  font-family: var(--font-display);
  font-weight: 500;
  letter-spacing: 0.05em;
}
.progress-bar-mini {
  width: 36px; height: 4px;
  background: rgba(255,255,255,0.06);
  border-radius: 2px;
  overflow: hidden;
}
.progress-bar-mini .fill {
  height: 100%;
  border-radius: 2px;
  background: var(--accent-orange);
  transition: width 0.8s ease-out;
}

/* ═══════════════════════════════════════════════════════
   LEADERBOARD — STANDINGS TABLE (sticky cols + header)
   ═══════════════════════════════════════════════════════ */
.table-wrap {
  overflow-x: auto;
  overflow-y: auto;
  max-height: 75vh;
  -webkit-overflow-scrolling: touch;
  border-radius: var(--radius);
  border: 1px solid var(--border);
  background: var(--bg-card);
  position: relative;
}
.standings { width: 100%; border-collapse: separate; border-spacing: 0; }
.standings th, .standings td {
  padding: 7px 6px;
  text-align: center;
  font-size: 0.92rem;
  white-space: nowrap;
}
.standings th {
  font-family: var(--font-display);
  font-weight: 600;
  font-size: 0.82rem;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--text-muted);
  border-bottom: 1px solid var(--border);
  position: sticky;
  top: 0;
  z-index: 4;
  background: var(--bg-elevated);
  cursor: pointer;
  user-select: none;
  transition: color 0.15s;
}
.standings th:hover { color: var(--text-primary); }
.standings th .sort-arrow { font-size: 0.65rem; margin-left: 2px; color: var(--accent-orange); }
.standings td { border-bottom: 1px solid var(--border); }
.standings tr:last-child td { border-bottom: none; }
.standings tr:hover td { background: rgba(255,255,255,0.02); }
/* Sticky rank column */
.standings .col-rank {
  position: sticky;
  left: 0;
  z-index: 2;
  background: var(--bg-card);
  font-family: var(--font-display);
  font-weight: 700;
  color: var(--text-muted);
  width: 30px;
  min-width: 30px;
  max-width: 30px;
  padding-left: 8px;
  padding-right: 4px;
}
.standings th.col-rank {
  z-index: 5;
  background: var(--bg-elevated);
}
/* Sticky name column */
.standings .col-name {
  position: sticky;
  left: 30px;
  z-index: 2;
  background: var(--bg-card);
  text-align: left;
  font-family: var(--font-display);
  font-weight: 600;
  font-size: 1rem;
  letter-spacing: 0.02em;
  min-width: 90px;
  max-width: 110px;
  padding-right: 8px;
  border-right: 1px solid var(--border);
}
.standings th.col-name {
  z-index: 5;
  background: var(--bg-elevated);
}
.standings tr:hover .col-rank,
.standings tr:hover .col-name { background: #0e1424; }
/* Total column */
.standings .col-total {
  font-family: var(--font-display);
  font-weight: 700;
  font-size: 1.1rem;
  color: var(--accent-orange);
  min-width: 44px;
}
/* Round score columns */
.standings .col-round {
  font-family: var(--font-display);
  font-weight: 500;
  color: var(--text-secondary);
  min-width: 40px;
  position: relative;
}
/* MVP / Cold badges */
.badge-mvp, .badge-cold {
  display: inline-block;
  font-family: var(--font-display);
  font-weight: 700;
  font-size: 0.55rem;
  letter-spacing: 0.04em;
  text-transform: uppercase;
  padding: 1px 4px;
  border-radius: 3px;
  margin-left: 2px;
  vertical-align: middle;
}
.badge-mvp { background: var(--accent-orange-dim); color: var(--accent-orange); }
.badge-cold { background: var(--cold-dim); color: var(--cold-blue); }
/* Rank coloring */
.standings .rank-1 .col-name { color: var(--gold); }
.standings .rank-2 .col-name { color: var(--silver); }
.standings .rank-3 .col-name { color: var(--bronze); }
/* Rank movement */
.movement { font-size: 0.72rem; margin-left: 3px; }
.movement.up { color: var(--correct); }
.movement.down { color: var(--wrong); }
.movement.same { color: var(--text-muted); }

/* ═══════════════════════════════════════════════════════
   PICKS VIEW
   ═══════════════════════════════════════════════════════ */
.round-filters {
  display: flex;
  gap: 4px;
  flex-wrap: wrap;
  margin-bottom: 16px;
  justify-content: center;
}
.filter-btn {
  font-family: var(--font-display);
  font-weight: 600;
  font-size: 0.88rem;
  letter-spacing: 0.05em;
  text-transform: uppercase;
  padding: 6px 14px;
  border-radius: 5px;
  color: var(--text-secondary);
  background: rgba(255,255,255,0.03);
  border: 1px solid var(--border);
  transition: all 0.2s;
}
.filter-btn.active {
  color: var(--text-primary);
  background: var(--accent-blue-dim);
  border-color: rgba(0,212,255,0.3);
}
.filter-btn:not(.active):hover { border-color: var(--border-hover); color: var(--text-primary); }
.picks-grid {
  display: grid;
  grid-template-columns: 1fr;
  gap: 12px;
}
@media (min-width: 640px) { .picks-grid { grid-template-columns: 1fr 1fr; } }
@media (min-width: 900px) { .picks-grid { grid-template-columns: 1fr 1fr 1fr; } }

.person-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
  transition: border-color 0.2s;
}
.person-card:hover { border-color: var(--border-hover); }
.person-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 10px 12px;
  border-bottom: 1px solid var(--border);
  background: rgba(255,255,255,0.02);
}
.person-name {
  font-family: var(--font-display);
  font-weight: 700;
  font-size: 1.05rem;
  letter-spacing: 0.04em;
  text-transform: uppercase;
}
.person-score {
  font-family: var(--font-display);
  font-weight: 700;
  font-size: 1.1rem;
  color: var(--accent-orange);
}
.person-picks { padding: 4px 0; }
.pick-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 5px 12px;
  font-size: 0.9rem;
  border-bottom: 1px solid rgba(255,255,255,0.02);
}
.pick-row:last-child { border-bottom: none; }
.pick-team {
  font-family: var(--font-display);
  font-weight: 500;
  letter-spacing: 0.02em;
  flex: 1;
}
.pick-matchup {
  font-size: 0.75rem;
  color: var(--text-muted);
  margin-right: 8px;
  flex-shrink: 0;
}
.pick-status {
  font-family: var(--font-display);
  font-weight: 700;
  font-size: 0.82rem;
  width: 36px;
  text-align: right;
  flex-shrink: 0;
}
.pick-status.correct { color: var(--correct); }
.pick-status.wrong { color: var(--wrong); }
.pick-status.pending { color: var(--text-muted); }
.pick-row.correct { background: var(--correct-dim); }
.pick-row.wrong { background: var(--wrong-dim); }

/* ═══════════════════════════════════════════════════════
   CONSENSUS
   ═══════════════════════════════════════════════════════ */
.consensus-list { display: flex; flex-direction: column; gap: 8px; }
.consensus-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 10px 14px;
}
.consensus-matchup {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 8px;
}
.consensus-team {
  font-family: var(--font-display);
  font-weight: 600;
  font-size: 0.95rem;
  letter-spacing: 0.02em;
}
.consensus-seed { font-size: 0.75rem; color: var(--text-muted); font-weight: 400; }
.consensus-vs { font-size: 0.75rem; color: var(--text-muted); font-family: var(--font-display); letter-spacing: 0.08em; }
.consensus-team.winner { color: var(--correct); }
.consensus-bars { display: flex; gap: 3px; height: 6px; border-radius: 3px; overflow: hidden; }
.consensus-bar-seg { height: 100%; transition: width 0.6s ease-out; border-radius: 3px; }
.consensus-bar-seg.team1 { background: var(--accent-blue); }
.consensus-bar-seg.team2 { background: var(--accent-orange); }
.consensus-counts {
  display: flex;
  justify-content: space-between;
  font-size: 0.88rem;
  color: var(--text-muted);
  margin-top: 4px;
  font-family: var(--font-display);
  font-weight: 500;
}
.consensus-counts .picker-names { font-size: 0.78rem; color: var(--text-secondary); }
.consensus-region-header {
  font-family: var(--font-display);
  font-weight: 700;
  font-size: 0.82rem;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--accent-blue);
  margin: 14px 0 8px;
}

/* ═══════════════════════════════════════════════════════
   UPSETS
   ═══════════════════════════════════════════════════════ */
.upset-card {
  background: var(--bg-card);
  border: 1px solid rgba(255,71,87,0.15);
  border-radius: var(--radius);
  padding: 10px 14px;
  margin-bottom: 8px;
  border-left: 3px solid var(--wrong);
}
.upset-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 4px;
  flex-wrap: wrap;
  gap: 4px;
}
.upset-result { font-family: var(--font-display); font-weight: 700; font-size: 0.95rem; color: var(--wrong); }
.upset-round-label { font-size: 0.75rem; color: var(--text-muted); font-family: var(--font-display); }
.upset-callers { font-size: 0.85rem; color: var(--text-secondary); }
.upset-callers strong { color: var(--correct); font-weight: 600; }

/* ═══════════════════════════════════════════════════════
   LONE WOLF
   ═══════════════════════════════════════════════════════ */
.wolf-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 10px 14px;
  margin-bottom: 8px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.wolf-info { flex: 1; }
.wolf-person { font-family: var(--font-display); font-weight: 700; font-size: 0.95rem; }
.wolf-pick { font-size: 0.85rem; color: var(--text-secondary); margin-top: 1px; }
.wolf-result {
  font-family: var(--font-display);
  font-weight: 700;
  font-size: 0.85rem;
  padding: 3px 10px;
  border-radius: 4px;
  flex-shrink: 0;
}
.wolf-result.correct { background: var(--correct-dim); color: var(--correct); }
.wolf-result.wrong { background: var(--wrong-dim); color: var(--wrong); }
.wolf-result.pending { background: rgba(255,255,255,0.04); color: var(--text-muted); }

/* ═══════════════════════════════════════════════════════
   HEAD-TO-HEAD
   ═══════════════════════════════════════════════════════ */
.h2h-selectors {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 16px;
  justify-content: center;
  flex-wrap: wrap;
}
.h2h-select {
  font-family: var(--font-display);
  font-weight: 600;
  font-size: 0.95rem;
  background: var(--bg-elevated);
  color: var(--text-primary);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 7px 30px 7px 12px;

        <div class="history-place last"><span class="history-medal">&#128128;</span><span class="history-rank-label">LAST</span><span class="history-name">Sara</span></div>

<script>
/* ═══════════════════════════════════════════════════════
   CONSTANTS
   ═══════════════════════════════════════════════════════ */
// Relative path works both locally and on GitHub Pages — avoids raw.githubusercontent.com CDN cache
const CSV_URL = 'bracket.csv';
const ROUND_CODES = new Set(['R64','R32','S16','E8','F4','NCG']);
const ROUND_ORDER = ['R64','R32','S16','E8','F4','NCG'];
const ROUND_LABELS = { R64:'R64', R32:'R32', S16:'S16', E8:'E8', F4:'F4', NCG:'NCG' };
const ROUND_FULL = { R64:'Round of 64', R32:'Round of 32', S16:'Sweet 16', E8:'Elite 8', F4:'Final Four', NCG:'Championship' };
const ROUND_POINTS = { R64:1, R32:2, S16:4, E8:8, F4:16, NCG:32 };
const ROUND_GAME_COUNTS = { R64:32, R32:16, S16:8, E8:4, F4:2, NCG:1 };
const SEED_PAIRS = [[1,16],[8,9],[5,12],[4,13],[6,11],[3,14],[7,10],[2,15]];

/* ═══════════════════════════════════════════════════════
   STATE
   ═══════════════════════════════════════════════════════ */
let state = {
  participants: [],
  games: [],
  seedMap: {},
  scores: {},
  rankings: [],
  movement: {},
  roundMVPs: {},
  roundColds: {},
  currentView: 'leaderboard',
  picksRoundFilter: 'ALL',
  consensusRoundFilter: 'R64',
  h2hPerson1: '',
  h2hPerson2: '',
  sortCol: 'total',
  sortDir: 'desc',
};

/* ═══════════════════════════════════════════════════════
   CSV PARSING
   ═══════════════════════════════════════════════════════ */
function parseCSV(text) {
  const lines = text.trim().split('\n').map(l => l.replace(/\r$/, ''));
  const headers = lines[0].split(',');
  const participants = headers.slice(6).map(h => h.trim()).filter(Boolean);
  const games = [];
  for (let i = 1; i < lines.length; i++) {
    const cols = lines[i].split(',');
    const round = cols[0]?.trim();
    if (!ROUND_CODES.has(round)) continue;
    const team1 = cols[3]?.trim() || '';
    const team2 = cols[4]?.trim() || '';
    if (!team1 && !team2) {
      games.push({ round, points: parseInt(cols[1]) || 0, region: cols[2]?.trim() || '', team1:'', team2:'', winner:'', picks:{} });
      continue;
    }
    const picks = {};
    participants.forEach((p, idx) => { picks[p] = cols[6 + idx]?.trim() || ''; });
    games.push({ round, points: parseInt(cols[1]) || 0, region: cols[2]?.trim() || '', team1, team2, winner: cols[5]?.trim() || '', picks });
  }
  return { participants, games };
}

/* ═══════════════════════════════════════════════════════
   SEED MAP
   ═══════════════════════════════════════════════════════ */
function buildSeedMap(games) {
  const seedMap = {};
  const regions = {};
  for (const g of games) {
    if (g.round !== 'R64' || !g.team1) continue;
    if (!regions[g.region]) regions[g.region] = [];
    regions[g.region].push(g);
  }
  for (const region in regions) {
    regions[region].forEach((g, i) => {
      if (i < SEED_PAIRS.length) {
        seedMap[g.team1.toLowerCase()] = SEED_PAIRS[i][0];
        seedMap[g.team2.toLowerCase()] = SEED_PAIRS[i][1];
      }
    });
  }
  return seedMap;
}
function getSeed(team, seedMap) { return seedMap[team.toLowerCase()] || '?'; }

/* ═══════════════════════════════════════════════════════
   SCORING
   ═══════════════════════════════════════════════════════ */
function calculateScores(games, participants) {
  const scores = {};
  for (const p of participants) {
    scores[p] = { total: 0, byRound: {} };
    ROUND_ORDER.forEach(r => scores[p].byRound[r] = 0);
  }
  for (const g of games) {
    if (!g.winner) continue;
    const w = g.winner.toLowerCase();
    for (const p of participants) {
      if (g.picks[p] && g.picks[p].toLowerCase() === w) {
        scores[p].total += g.points;
        scores[p].byRound[g.round] += g.points;
      }
    }
  }
  return scores;
}

function rankParticipants(scores) {
  return Object.entries(scores).map(([name, s]) => ({ name, ...s })).sort((a, b) => b.total - a.total);
}

// Assigns tied ranks: equal scores = equal rank, next rank skips (1,1,3 not 1,1,2)
function assignTiedRanks(ranking) {
  const ranks = {};
  let currentRank = 1;
  for (let i = 0; i < ranking.length; i++) {
    if (i > 0 && ranking[i].total < ranking[i - 1].total) currentRank = i + 1;
    ranks[ranking[i].name] = currentRank;
  }
  return ranks;
}

/* ═══════════════════════════════════════════════════════
   RANK MOVEMENT
   ═══════════════════════════════════════════════════════ */
function calculateMovement(games, participants) {
  let latestRound = null;
  for (let i = ROUND_ORDER.length - 1; i >= 0; i--) {
    if (games.some(g => g.round === ROUND_ORDER[i] && g.winner)) { latestRound = ROUND_ORDER[i]; break; }
  }
  if (!latestRound || latestRound === ROUND_ORDER[0]) return {};
  const prevGames = games.map(g => g.round === latestRound ? { ...g, winner: '' } : g);
  const prevRanking = rankParticipants(calculateScores(prevGames, participants));
  const currRanking = rankParticipants(calculateScores(games, participants));
  const prevRanks = assignTiedRanks(prevRanking);
  const currRanks = assignTiedRanks(currRanking);
  const movement = {};
  participants.forEach(p => {
    movement[p] = prevRanks[p] - currRanks[p];
  });
  return movement;
}

/* ═══════════════════════════════════════════════════════
   ROUND MVP & COLD
   ═══════════════════════════════════════════════════════ */
function getRoundMVPs(games, participants) {
  const mvps = {};
  for (const round of ROUND_ORDER) {
    const rGames = games.filter(g => g.round === round && g.winner);
    if (rGames.length === 0) continue;
    const activePickers = participants.filter(p => rGames.some(g => g.picks[p]));
    if (activePickers.length === 0) continue;
    let maxScore = -1;
    for (const p of activePickers) {
      let s = 0;
      for (const g of rGames) { if (g.picks[p]?.toLowerCase() === g.winner.toLowerCase()) s += g.points; }
      if (s > maxScore) maxScore = s;
    }
    const winners = activePickers.filter(p => {
      let s = 0;
      for (const g of rGames) { if (g.picks[p]?.toLowerCase() === g.winner.toLowerCase()) s += g.points; }
      return s === maxScore;
    });
    // Only award MVP if not everyone has the same score
    if (winners.length < activePickers.length) mvps[round] = { names: winners, score: maxScore };
  }
  return mvps;
}

function getRoundColds(games, participants) {
  const colds = {};
  for (const round of ROUND_ORDER) {
    const rGames = games.filter(g => g.round === round && g.winner);
    if (rGames.length === 0) continue;
    // Only consider participants who submitted at least one pick in this round
    const activePickers = participants.filter(p => rGames.some(g => g.picks[p]));
    if (activePickers.length === 0) continue;
    let minScore = Infinity;
    for (const p of activePickers) {
      let s = 0;
      for (const g of rGames) { if (g.picks[p]?.toLowerCase() === g.winner.toLowerCase()) s += g.points; }
      if (s < minScore) minScore = s;
    }
    const losers = activePickers.filter(p => {
      let s = 0;
      for (const g of rGames) { if (g.picks[p]?.toLowerCase() === g.winner.toLowerCase()) s += g.points; }
      return s === minScore;
    });
    // Only show cold badge if not everyone has the same score
    if (losers.length < activePickers.length) colds[round] = { names: losers, score: minScore };
  }
  return colds;
}

/* ═══════════════════════════════════════════════════════
   UPSETS
   ═══════════════════════════════════════════════════════ */
function findUpsets(games, seedMap, participants) {
  const upsets = [];
  for (const g of games) {
    if (!g.winner || !g.team1 || !g.team2) continue;
    const s1 = getSeed(g.team1, seedMap);
    const s2 = getSeed(g.team2, seedMap);
    if (s1 === '?' || s2 === '?') continue;
    if ((s1 === 8 && s2 === 9) || (s1 === 9 && s2 === 8)) continue;
    const wIsTeam1 = g.winner.toLowerCase() === g.team1.toLowerCase();
    const winSeed = wIsTeam1 ? s1 : s2;
    const loseSeed = wIsTeam1 ? s2 : s1;
    if (winSeed > loseSeed) {
      const callers = participants.filter(p => g.picks[p]?.toLowerCase() === g.winner.toLowerCase());
      upsets.push({ winner: g.winner, loser: wIsTeam1 ? g.team2 : g.team1, winSeed, loseSeed, callers, round: g.round, region: g.region });
    }
  }
  return upsets;
}

/* ═══════════════════════════════════════════════════════
   LONE WOLVES
   ═══════════════════════════════════════════════════════ */
function findLoneWolves(games, participants) {
  const wolves = [];
  for (const g of games) {
    if (!g.team1 || !g.team2) continue;
    const pickCounts = {};
    for (const p of participants) {
      const pick = g.picks[p];
      if (pick) {
        const k = pick.toLowerCase();
        if (!pickCounts[k]) pickCounts[k] = { original: pick, people: [] };
        pickCounts[k].people.push(p);
      }
    }
    for (const key in pickCounts) {
      if (pickCounts[key].people.length === 1) {
        const correct = g.winner ? key === g.winner.toLowerCase() : null;
        wolves.push({ person: pickCounts[key].people[0], team: pickCounts[key].original, vs: key === g.team1.toLowerCase() ? g.team2 : g.team1, round: g.round, correct, game: g });
      }
    }
  }
  return wolves;
}

/* ═══════════════════════════════════════════════════════
   AWARDS CALCULATIONS
   ═══════════════════════════════════════════════════════ */
function calculateAwards(games, participants, seedMap, scores) {
  const awards = [];
  const upsets = findUpsets(games, seedMap, participants);

  // Most Upsets Called
  if (upsets.length > 0) {
    const counts = {};
    participants.forEach(p => counts[p] = 0);
    upsets.forEach(u => u.callers.forEach(p => counts[p]++));
    const max = Math.max(...Object.values(counts));
    const winners = participants.filter(p => counts[p] === max);
    awards.push({ icon: '&#127942;', title: 'Most Upsets Called', winner: winners.join(', '), stat: `${max} upset${max !== 1 ? 's' : ''} predicted` });
  }

  // Most Upsets Missed
  if (upsets.length > 0) {
    const counts = {};
    participants.forEach(p => counts[p] = 0);
    upsets.forEach(u => {
      participants.forEach(p => {
        if (u.callers.indexOf(p) === -1) {
          const g = games.find(g2 => g2.winner?.toLowerCase() === u.winner.toLowerCase() && g2.round === u.round && g2.region === u.region);
          if (g && g.picks[p]) counts[p]++;
        }
      });
    });
    const max = Math.max(...Object.values(counts));
    const winners = participants.filter(p => counts[p] === max);
    awards.push({ icon: '&#128561;', title: 'Most Upsets Missed', winner: winners.join(', '), stat: `${max} upset${max !== 1 ? 's' : ''} missed` });
  }

  // Highest Single-Round Score
  const roundsWithResults = ROUND_ORDER.filter(r => games.some(g => g.round === r && g.winner));
  if (roundsWithResults.length > 0) {
    let best = { name: '', round: '', score: 0 };
    for (const r of roundsWithResults) {
      for (const p of participants) {
        const s = scores[p]?.byRound[r] || 0;
        if (s > best.score) best = { name: p, round: r, score: s };
      }
    }
    const bestTies = participants.filter(p => (scores[p]?.byRound[best.round] || 0) === best.score);
    awards.push({ icon: '&#128293;', title: 'Highest Round Score', winner: bestTies.join(', '), stat: `${best.score} pts in ${ROUND_FULL[best.round] || best.round}` });
  }

  // Lowest Single-Round Score
  if (roundsWithResults.length > 0) {
    let worst = { name: '', round: '', score: Infinity };
    for (const r of roundsWithResults) {
      for (const p of participants) {
        const s = scores[p]?.byRound[r] || 0;
        if (s < worst.score) worst = { name: p, round: r, score: s };
      }
    }
    const worstTies = participants.filter(p => (scores[p]?.byRound[worst.round] || 0) === worst.score);
    awards.push({ icon: '&#129398;', title: 'Lowest Round Score', winner: worstTies.join(', '), stat: `${worst.score} pts in ${ROUND_FULL[worst.round] || worst.round}` });
  }

  // Chalkiest Picker (highest % higher-seed picks in R64)
  const r64Games = games.filter(g => g.round === 'R64' && g.team1 && g.team2);
  if (r64Games.length > 0) {
    const chalkPcts = {};
    participants.forEach(p => {
      let chalk = 0, total = 0;
      r64Games.forEach(g => {
        if (!g.picks[p]) return;
        total++;
        const s1 = getSeed(g.team1, seedMap);
        const s2 = getSeed(g.team2, seedMap);
        const pickSeed = g.picks[p].toLowerCase() === g.team1.toLowerCase() ? s1 : s2;
        const higherSeed = Math.min(s1, s2);
        if (pickSeed === higherSeed) chalk++;
      });
      chalkPcts[p] = total > 0 ? chalk / total : 0;
    });
    const max = Math.max(...Object.values(chalkPcts));
    const winners = participants.filter(p => chalkPcts[p] === max);
    awards.push({ icon: '&#128218;', title: 'Chalkiest Picker', winner: winners.join(', '), stat: `${Math.round(max * 100)}% favorites picked` });
  }

  // Boldest Picker (highest % lower-seed picks in R64)
  if (r64Games.length > 0) {
    const boldPcts = {};
    participants.forEach(p => {
      let bold = 0, total = 0;
      r64Games.forEach(g => {
        if (!g.picks[p]) return;
        total++;
        const s1 = getSeed(g.team1, seedMap);
        const s2 = getSeed(g.team2, seedMap);
        const pickSeed = g.picks[p].toLowerCase() === g.team1.toLowerCase() ? s1 : s2;
        const lowerSeed = Math.max(s1, s2);
        if (pickSeed === lowerSeed) bold++;
      });
      boldPcts[p] = total > 0 ? bold / total : 0;
    });
    const max = Math.max(...Object.values(boldPcts));
    const winners = participants.filter(p => boldPcts[p] === max);
    awards.push({ icon: '&#127922;', title: 'Boldest Picker', winner: winners.join(', '), stat: `${Math.round(max * 100)}% underdogs picked` });
  }

  // Consensus Crusher
  const decidedGames = games.filter(g => g.winner && g.team1 && g.team2);
  if (decidedGames.length > 0) {
    const crushCounts = {};
    participants.forEach(p => crushCounts[p] = 0);
    decidedGames.forEach(g => {
      // Determine majority pick
      let t1 = 0, t2 = 0;
      participants.forEach(p => {
        if (!g.picks[p]) return;
        if (g.picks[p].toLowerCase() === g.team1.toLowerCase()) t1++;
        else t2++;
      });
      const total = t1 + t2;
      // Only count if there's a clear majority (>50%), skip 50/50 splits
      if (t1 === t2 || total === 0) return;
      const majorityTeam = t1 > t2 ? g.team1.toLowerCase() : g.team2.toLowerCase();
      participants.forEach(p => {
        if (!g.picks[p]) return;
        const picked = g.picks[p].toLowerCase();
        if (picked !== majorityTeam && picked === g.winner.toLowerCase()) {
          crushCounts[p]++;
        }
      });
    });
    const max = Math.max(...Object.values(crushCounts));
    if (max > 0) {
      const winners = participants.filter(p => crushCounts[p] === max);
      awards.push({ icon: '&#128165;', title: 'Consensus Crusher', winner: winners.join(', '), stat: `${max} correct against majority` });
    }

    // Playing it Safe — least times picked against majority
    const againstCounts = {};
    participants.forEach(p => againstCounts[p] = 0);
    decidedGames.forEach(g => {
      let t1 = 0, t2 = 0;
      participants.forEach(p => {
        if (!g.picks[p]) return;
        if (g.picks[p].toLowerCase() === g.team1.toLowerCase()) t1++;
        else t2++;
      });
      if (t1 === t2 || (t1 + t2) === 0) return;
      const majorityTeam = t1 > t2 ? g.team1.toLowerCase() : g.team2.toLowerCase();
      participants.forEach(p => {
        if (!g.picks[p]) return;
        if (g.picks[p].toLowerCase() !== majorityTeam) againstCounts[p]++;
      });
    });
    const minAgainst = Math.min(...Object.values(againstCounts));
    const safeWinners = participants.filter(p => againstCounts[p] === minAgainst);
    awards.push({ icon: '&#128017;', title: 'Playing it Safe', winner: safeWinners.join(', '), stat: `${minAgainst} time${minAgainst !== 1 ? 's' : ''} went against majority` });
  }

  return awards;
}

/* ═══════════════════════════════════════════════════════
   RENDERERS
   ═══════════════════════════════════════════════════════ */

// ── LEADERBOARD ─────────────────────────────────────
function renderLeaderboard() {
  const { rankings, movement, roundMVPs, roundColds, games, scores, participants } = state;
  if (rankings.length === 0) {
    document.getElementById('podium').innerHTML = '';
    document.getElementById('standings').innerHTML = '<tr><td class="empty-state" colspan="9"><span class="icon">&#127942;</span>No data yet</td></tr>';
    document.getElementById('progress').innerHTML = '';
    return;
  }

  // Podium
  const top3 = rankings.slice(0, 3);
  const medals = ['gold','silver','bronze'];
  const medalEmojis = ['&#127942;','&#129352;','&#129353;'];
  const rankLabels = ['1ST','2ND','3RD'];
  document.getElementById('podium').innerHTML = top3.map((p, i) => `
    <div class="podium-card ${medals[i]} animate-in stagger-${i+1}">
      <span class="podium-medal">${medalEmojis[i]}</span>
      <div class="podium-rank">${rankLabels[i]}</div>
      <div class="podium-score">${p.total}</div>
      <div class="podium-name">${esc(p.name)}</div>
    </div>
  `).join('');

  // Progress
  document.getElementById('progress').innerHTML = ROUND_ORDER.map(r => {
    const total = ROUND_GAME_COUNTS[r];
    const complete = games.filter(g => g.round === r && g.winner).length;
    const pct = total > 0 ? (complete / total * 100) : 0;
    return `<div class="progress-item"><span>${ROUND_LABELS[r]}</span><div class="progress-bar-mini"><div class="fill" style="width:${pct}%"></div></div><span>${complete}/${total}</span></div>`;
  }).join('');

  // Sorted rankings
  let sorted = [...rankings];
  const col = state.sortCol;
  const dir = state.sortDir === 'asc' ? 1 : -1;
  if (col === 'name') {
    sorted.sort((a, b) => dir * a.name.localeCompare(b.name));
  } else if (col === 'total') {
    sorted.sort((a, b) => dir * (a.total - b.total));
  } else {
    sorted.sort((a, b) => dir * ((a.byRound[col] || 0) - (b.byRound[col] || 0)));
  }

  const arrow = (c) => state.sortCol === c ? `<span class="sort-arrow">${state.sortDir === 'desc' ? '&#9660;' : '&#9650;'}</span>` : '';

  let html = `<thead><tr>
    <th class="col-rank">#</th>
    <th class="col-name" data-sort="name">NAME${arrow('name')}</th>
    <th data-sort="total">PTS${arrow('total')}</th>
    ${ROUND_ORDER.map(r => `<th class="col-round" data-sort="${r}">${ROUND_LABELS[r]}${arrow(r)}</th>`).join('')}
  </tr></thead><tbody>`;

  // Compute original rank for each person (by total descending)
  const origRank = assignTiedRanks(rankings);

  sorted.forEach(p => {
    const rank = origRank[p.name];
    const rankClass = rank <= 3 ? ` rank-${rank}` : '';
    const mv = movement[p.name] || 0;
    const mvHtml = mv > 0 ? `<span class="movement up">&#9650;${mv}</span>`
      : mv < 0 ? `<span class="movement down">&#9660;${Math.abs(mv)}</span>`
      : (Object.keys(movement).length > 0 ? `<span class="movement same">&ndash;</span>` : '');
    const roundCells = ROUND_ORDER.map(r => {
      const val = p.byRound[r] || 0;
      let badges = '';
      if (roundMVPs[r]?.names?.includes(p.name)) badges += '<span class="badge-mvp">MVP</span>';
      if (roundColds[r]?.names?.includes(p.name)) badges += '<span style="font-size:0.7rem;margin-left:2px">&#128078;</span>';
      return `<td class="col-round">${val}${badges}</td>`;
    }).join('');

    html += `<tr class="${rankClass}">
      <td class="col-rank">${rank}</td>
      <td class="col-name">${esc(p.name)}${mvHtml}</td>
      <td class="col-total">${p.total}</td>
      ${roundCells}
    </tr>`;
  });
  html += '</tbody>';
  document.getElementById('standings').innerHTML = html;

  // Attach sort handlers
  document.querySelectorAll('#standings th[data-sort]').forEach(th => {
    th.addEventListener('click', () => {
      const col = th.dataset.sort;
      if (state.sortCol === col) state.sortDir = state.sortDir === 'desc' ? 'asc' : 'desc';
      else { state.sortCol = col; state.sortDir = 'desc'; }
      renderLeaderboard();
    });
  });
}

// ── PICKS ───────────────────────────────────────────
function renderPicksFilters() {
  const { games } = state;
  const activeRounds = ROUND_ORDER.filter(r => games.some(g => g.round === r && (g.team1 || g.team2)));
  const btns = ['ALL', ...activeRounds].map(r =>
    `<button class="filter-btn${state.picksRoundFilter === r ? ' active' : ''}" data-round="${r}">${r === 'ALL' ? 'All' : ROUND_LABELS[r]}</button>`
  ).join('');
  document.getElementById('round-filters').innerHTML = btns;
  document.querySelectorAll('#round-filters .filter-btn').forEach(btn => {
    btn.addEventListener('click', () => { state.picksRoundFilter = btn.dataset.round; renderPicksFilters(); renderPicksGrid(); });
  });
}

function renderPicksGrid() {
  const { participants, games, scores } = state;
  const filter = state.picksRoundFilter;
  const filtered = filter === 'ALL' ? games.filter(g => g.team1 || g.team2) : games.filter(g => g.round === filter && (g.team1 || g.team2));
  if (filtered.length === 0) {
    document.getElementById('picks-grid').innerHTML = '<div class="empty-state"><span class="icon">&#128203;</span>No games in this round yet</div>';
    return;
  }
  const ranked = state.rankings.length ? state.rankings.map(r => r.name) : participants;
  document.getElementById('picks-grid').innerHTML = ranked.map(p => {
    const total = scores[p]?.total || 0;
    const rows = filtered.map(g => {
      const pick = g.picks[p] || '—';
      const hasWinner = !!g.winner;
      const isCorrect = hasWinner && pick.toLowerCase() === g.winner.toLowerCase();
      const statusClass = !g.picks[p] ? 'pending' : hasWinner ? (isCorrect ? 'correct' : 'wrong') : 'pending';
      const statusText = !g.picks[p] ? '—' : hasWinner ? (isCorrect ? `+${g.points}` : '0') : '...';
      return `<div class="pick-row ${statusClass}"><span class="pick-matchup">${esc(g.region || g.round)}</span><span class="pick-team">${esc(pick)}</span><span class="pick-status ${statusClass}">${statusText}</span></div>`;
    }).join('');
    return `<div class="person-card animate-in"><div class="person-header"><span class="person-name">${esc(p)}</span><span class="person-score">${total} pts</span></div><div class="person-picks">${rows}</div></div>`;
  }).join('');
}

// ── CONSENSUS ───────────────────────────────────────
function renderConsensusFilters() {
  const { games } = state;
  const activeRounds = ROUND_ORDER.filter(r => games.some(g => g.round === r && g.team1 && g.team2));
  if (activeRounds.length === 0) return;
  if (!activeRounds.includes(state.consensusRoundFilter)) state.consensusRoundFilter = activeRounds[0];
  document.getElementById('consensus-filters').innerHTML = activeRounds.map(r =>
    `<button class="filter-btn${state.consensusRoundFilter === r ? ' active' : ''}" data-round="${r}">${ROUND_LABELS[r]}</button>`
  ).join('');
  document.querySelectorAll('#consensus-filters .filter-btn').forEach(btn => {
    btn.addEventListener('click', () => { state.consensusRoundFilter = btn.dataset.round; renderConsensusFilters(); renderConsensus(); });
  });
}

function renderConsensus() {
  const { games, participants, seedMap } = state;
  const round = state.consensusRoundFilter;
  const filtered = games.filter(g => g.round === round && g.team1 && g.team2);
  if (filtered.length === 0) {
    document.getElementById('consensus').innerHTML = '<div class="empty-state">No matchups yet</div>';
    return;
  }
  const byRegion = {};
  filtered.forEach(g => { const r = g.region || 'Other'; if (!byRegion[r]) byRegion[r] = []; byRegion[r].push(g); });
  let html = '';
  for (const region in byRegion) {
    if (Object.keys(byRegion).length > 1) html += `<div class="consensus-region-header">${esc(region)}</div>`;
    byRegion[region].forEach(g => {
      let t1Count = 0, t2Count = 0;
      const t1Pickers = [], t2Pickers = [];
      participants.forEach(p => {
        if (!g.picks[p]) return;
        if (g.picks[p].toLowerCase() === g.team1.toLowerCase()) { t1Count++; t1Pickers.push(p); }
        else { t2Count++; t2Pickers.push(p); }
      });
      const totalPickers = t1Count + t2Count;
      const t1Pct = totalPickers > 0 ? (t1Count / totalPickers * 100) : 50;
      const s1 = getSeed(g.team1, seedMap), s2 = getSeed(g.team2, seedMap);
      const t1W = g.winner && g.winner.toLowerCase() === g.team1.toLowerCase();
      const t2W = g.winner && g.winner.toLowerCase() === g.team2.toLowerCase();
      const t1Names = t1Count <= 3 && t1Count > 0 ? ` <span class="picker-names">(${t1Pickers.map(esc).join(', ')})</span>` : '';
      const t2Names = t2Count <= 3 && t2Count > 0 ? ` <span class="picker-names">(${t2Pickers.map(esc).join(', ')})</span>` : '';
      html += `<div class="consensus-card"><div class="consensus-matchup"><span class="consensus-team${t1W ? ' winner' : ''}"><span class="consensus-seed">(${s1})</span> ${esc(g.team1)}</span><span class="consensus-vs">VS</span><span class="consensus-team${t2W ? ' winner' : ''}"><span class="consensus-seed">(${s2})</span> ${esc(g.team2)}</span></div><div class="consensus-bars"><div class="consensus-bar-seg team1" style="width:${t1Pct}%"></div><div class="consensus-bar-seg team2" style="width:${100-t1Pct}%"></div></div><div class="consensus-counts"><span>${t1Count} picked${t1Names}</span><span>${t2Count} picked${t2Names}</span></div></div>`;
    });
  }
  document.getElementById('consensus').innerHTML = html;
}

// ── UPSETS ───────────────────────────────────────────
function renderUpsets() {
  const upsets = findUpsets(state.games, state.seedMap, state.participants);
  if (upsets.length === 0) {
    document.getElementById('upsets').innerHTML = '<div class="empty-state"><span class="icon">&#128064;</span>No upsets yet — stay tuned!</div>';
    return;
  }
  const calledUpsets = upsets.filter(u => u.callers.length > 0);
  const noOneUpsets = upsets.filter(u => u.callers.length === 0);
  // For "Missed It": upsets where ≥1 person called it, show who DIDN'T (picked the favorite)
  const missedData = calledUpsets.map(u => {
    const missers = state.participants.filter(p => {
      const g = state.games.find(g2 => g2.winner && g2.winner.toLowerCase() === u.winner.toLowerCase() && g2.round === u.round && g2.region === u.region);
      return g && g.picks[p] && g.picks[p].toLowerCase() !== u.winner.toLowerCase();
    });
    return { ...u, missers };
  }).filter(u => u.missers.length > 0);
  let html = '';
  if (calledUpsets.length > 0) {
    html += '<div class="section-title" style="color:var(--correct)">Called It</div>';
    html += calledUpsets.map(u => `
      <div class="upset-card animate-in" style="border-left-color:var(--correct);border-color:rgba(0,230,118,0.15)">
        <div class="upset-header">
          <span class="upset-result" style="color:var(--correct)">(${u.winSeed}) ${esc(u.winner)} over (${u.loseSeed}) ${esc(u.loser)}</span>
          <span class="upset-round-label">${ROUND_FULL[u.round] || u.round} &bull; ${esc(u.region)}</span>
        </div>
        <div class="upset-callers">Called it: <strong>${u.callers.map(esc).join(', ')}</strong></div>
      </div>`).join('');
  }
  if (missedData.length > 0) {
    html += '<div class="section-title" style="color:var(--wrong);margin-top:24px">Missed It</div>';
    html += missedData.map(u => `
      <div class="upset-card animate-in">
        <div class="upset-header">
          <span class="upset-result">(${u.winSeed}) ${esc(u.winner)} over (${u.loseSeed}) ${esc(u.loser)}</span>
          <span class="upset-round-label">${ROUND_FULL[u.round] || u.round} &bull; ${esc(u.region)}</span>
        </div>
        <div class="upset-callers">Missed by: <strong style="color:var(--wrong)">${u.missers.map(esc).join(', ')}</strong></div>
      </div>`).join('');
  }
  if (noOneUpsets.length > 0) {
    html += '<div class="section-title" style="color:var(--gold);margin-top:24px">No One Saw It Coming</div>';
    html += noOneUpsets.map(u => `
      <div class="upset-card animate-in" style="border-left-color:var(--gold);border-color:rgba(255,215,0,0.15)">
        <div class="upset-header">
          <span class="upset-result" style="color:var(--gold)">(${u.winSeed}) ${esc(u.winner)} over (${u.loseSeed}) ${esc(u.loser)}</span>
          <span class="upset-round-label">${ROUND_FULL[u.round] || u.round} &bull; ${esc(u.region)}</span>
        </div>
      </div>`).join('');
  }
  document.getElementById('upsets').innerHTML = html;
}

// ── LONE WOLVES ─────────────────────────────────────
function renderLoneWolves() {
  const { seedMap } = state;
  const wolves = findLoneWolves(state.games, state.participants);
  if (wolves.length === 0) {
    document.getElementById('lone-wolves').innerHTML = '<div class="empty-state"><span class="icon">&#128058;</span>No lone wolf picks yet</div>';
    return;
  }
  wolves.sort((a, b) => (b.correct === true ? 1 : 0) - (a.correct === true ? 1 : 0));
  document.getElementById('lone-wolves').innerHTML = wolves.map(w => {

    const teamSeed = getSeed(w.team, seedMap);
    const vsSeed = getSeed(w.vs, seedMap);
    return `<div class="wolf-card animate-in"><div class="wolf-info"><div class="wolf-person">${esc(w.person)}</div><div class="wolf-pick">Picked (${teamSeed}) ${esc(w.team)} over (${vsSeed}) ${esc(w.vs)} &bull; ${ROUND_LABELS[w.round]}</div></div><div class="wolf-result ${resultClass}">${resultText}</div></div>`;
  }).join('');
}

// ── HEAD-TO-HEAD ────────────────────────────────────
function renderH2HSetup() {
  const { participants } = state;
  if (participants.length < 2) { document.getElementById('head-to-head').innerHTML = '<div class="empty-state">Need 2+ participants</div>'; return; }
  if (!state.h2hPerson1) state.h2hPerson1 = participants[0];
  if (!state.h2hPerson2) state.h2hPerson2 = participants[1];
  const opts = participants.map(p => `<option value="${esc(p)}">${esc(p)}</option>`).join('');
  document.getElementById('head-to-head').innerHTML = `
    <div class="h2h-selectors"><select class="h2h-select" id="h2h-p1">${opts}</select><span class="h2h-vs">VS</span><select class="h2h-select" id="h2h-p2">${opts}</select></div>
    <div id="h2h-summary" class="h2h-summary"></div>
    <div id="h2h-diffs" class="h2h-diff-list"></div>`;
  document.getElementById('h2h-p1').value = state.h2hPerson1;
  document.getElementById('h2h-p2').value = state.h2hPerson2;
  document.getElementById('h2h-p1').addEventListener('change', e => { state.h2hPerson1 = e.target.value; renderH2HResults(); });
  document.getElementById('h2h-p2').addEventListener('change', e => { state.h2hPerson2 = e.target.value; renderH2HResults(); });
  renderH2HResults();
}

function renderH2HResults() {
  const { games } = state;
  const p1 = state.h2hPerson1, p2 = state.h2hPerson2;
  if (p1 === p2) { document.getElementById('h2h-summary').innerHTML = ''; document.getElementById('h2h-diffs').innerHTML = '<div class="empty-state">Select two different participants</div>'; return; }
  const diffs = games.filter(g => g.team1 && g.team2 && g.picks[p1] && g.picks[p2] && g.picks[p1].toLowerCase() !== g.picks[p2].toLowerCase());
  let p1Wins = 0, p2Wins = 0;
  diffs.forEach(g => { if (!g.winner) return; const w = g.winner.toLowerCase(); if (g.picks[p1].toLowerCase() === w) p1Wins++; else if (g.picks[p2].toLowerCase() === w) p2Wins++; });
  document.getElementById('h2h-summary').innerHTML = `
    <div><div class="h2h-stat-name" style="color:var(--accent-blue)">${esc(p1)}</div><div class="h2h-stat-val" style="color:var(--accent-blue)">${p1Wins}</div><div class="h2h-stat-label">wins</div></div>
    <div><div class="h2h-stat-name" style="color:var(--text-muted)">Differ</div><div class="h2h-stat-val" style="color:var(--text-muted)">${diffs.length}</div><div class="h2h-stat-label">games</div></div>
    <div><div class="h2h-stat-name" style="color:var(--accent-orange)">${esc(p2)}</div><div class="h2h-stat-val" style="color:var(--accent-orange)">${p2Wins}</div><div class="h2h-stat-label">wins</div></div>`;
  if (diffs.length === 0) { document.getElementById('h2h-diffs').innerHTML = '<div class="empty-state">Agree on everything!</div>'; return; }
  document.getElementById('h2h-diffs').innerHTML = diffs.map(g => {
    const w = g.winner?.toLowerCase() || '';
    const p1C = !w ? 'pending' : (g.picks[p1].toLowerCase() === w ? 'correct' : 'wrong');
    const p2C = !w ? 'pending' : (g.picks[p2].toLowerCase() === w ? 'correct' : 'wrong');
    return `<div class="h2h-row"><span class="h2h-game-label">${ROUND_LABELS[g.round]}</span><span class="h2h-pick ${p1C}">${esc(g.picks[p1])}</span><span style="color:var(--text-muted);font-size:0.7rem">vs</span><span class="h2h-pick ${p2C}">${esc(g.picks[p2])}</span></div>`;
  }).join('');
}

// ── AWARDS ──────────────────────────────────────────
function renderAwards() {
  const awards = calculateAwards(state.games, state.participants, state.seedMap, state.scores);
  if (awards.length === 0) {
    document.getElementById('awards').innerHTML = '<div class="empty-state"><span class="icon">&#127942;</span>Awards unlock as games are played!</div>';
    return;
  }
  document.getElementById('awards').innerHTML = awards.map(a => `
    <div class="award-card animate-in">
      <div class="award-icon">${a.icon}</div>
      <div class="award-body">
        <div class="award-title">${a.title}</div>
        <div class="award-winner">${esc(a.winner)}</div>
        <div class="award-stat">${a.stat}</div>
      </div>
    </div>
  `).join('');
}

/* ═══════════════════════════════════════════════════════
   TAB NAVIGATION
   ═══════════════════════════════════════════════════════ */
function switchView(view) {
  state.currentView = view;
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.toggle('active', b.dataset.view === view));
  document.querySelectorAll('.view').forEach(v => v.classList.toggle('active', v.id === `view-${view}`));
  if (view === 'picks') { renderPicksFilters(); renderPicksGrid(); }
  if (view === 'consensus') { renderConsensusFilters(); renderConsensus(); }
  if (view === 'upsets') renderUpsets();
  if (view === 'lonewolf') renderLoneWolves();
  if (view === 'h2h') renderH2HSetup();
  if (view === 'awards') renderAwards();
}

document.querySelectorAll('.nav-btn').forEach(btn => {
  btn.addEventListener('click', () => switchView(btn.dataset.view));
});

/* ═══════════════════════════════════════════════════════
   UTILITY
   ═══════════════════════════════════════════════════════ */
function esc(s) { if (!s) return ''; const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

/* ═══════════════════════════════════════════════════════
   DATA LOAD & INIT
   ═══════════════════════════════════════════════════════ */
async function loadData() {
  const loadingEl = document.getElementById('loading');
  const errorEl = document.getElementById('error');
  loadingEl.style.display = 'flex';
  errorEl.style.display = 'none';
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  try {
    const resp = await fetch(CSV_URL + '?t=' + Date.now());
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    const text = await resp.text();
    const { participants, games } = parseCSV(text);
    state.participants = participants;
    state.games = games;
    state.seedMap = buildSeedMap(games);
    state.scores = calculateScores(games, participants);
    state.rankings = rankParticipants(state.scores);
    state.movement = calculateMovement(games, participants);
    state.roundMVPs = getRoundMVPs(games, participants);
    state.roundColds = getRoundColds(games, participants);
    loadingEl.style.display = 'none';
    renderLeaderboard();
    switchView(state.currentView);
    try {
      const commitResp = await fetch('https://api.github.com/repos/old-head-dev/papas-march-madness/commits?path=bracket.csv&per_page=1');
      if (commitResp.ok) {
        const commits = await commitResp.json();
        if (commits[0]?.commit?.author?.date) {
          const d = new Date(commits[0].commit.author.date);
          document.getElementById('lastUpdated').textContent = d.toLocaleString('en-US', { month: 'short', day: 'numeric', hour: 'numeric', minute: '2-digit', hour12: true });
        }
      }
    } catch (e) { document.getElementById('lastUpdated').textContent = 'Just now'; }
  } catch (err) {
    loadingEl.style.display = 'none';
    errorEl.style.display = 'block';
    errorEl.textContent = 'Failed to load bracket data. Check connection and try again.';
    console.error('Load error:', err);
  }
}

loadData();

// Auto-refresh when app returns to foreground (home screen web app)
document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'visible') loadData();
});
// iOS standalone mode fallback — pageshow fires reliably when swiping back
window.addEventListener('pageshow', (e) => {
  if (e.persisted) loadData();
});
// Also catch focus events as another fallback
window.addEventListener('focus', () => loadData());
</script>
